<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GMN ML Studio — Operations ML Tutorial</title>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("gmn-ml-tutorial-ui");
          if (!raw) return;
          var parsed = JSON.parse(raw);
          var st = parsed.state != null ? parsed.state : parsed;
          var mode = st.theme;
          var dark = false;
          if (mode === "dark") dark = true;
          else if (mode === "light") dark = false;
          else dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
